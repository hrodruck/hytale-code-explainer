services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./data/snapshots:/snapshots
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  qdrant-setup:
    build: .
    depends_on:
      - qdrant
    entrypoint: ["sh", "-c", "sleep 1 && uv run scripts/qdrant_import.py"] # 1s wait
    restart: "no"
    env_file:
      - .env

  litellm-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
    volumes:
      - litellm_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  litellm-proxy:
    image: docker.litellm.ai/berriai/litellm:main-latest
    depends_on:
      - litellm-postgres
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://litellm:litellm@litellm-postgres:5432/litellm"
    command: --config /app/config.yaml
    restart: unless-stopped

  discord-bot:
    build: .
    env_file:
      - .env
    command: discord
    restart: unless-stopped
    profiles: ["discord"]
    depends_on:
      - qdrant-setup
      - litellm-proxy

  app:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./temp:/app/temp
    depends_on:
      - qdrant-setup
      - litellm-proxy

volumes:
  qdrant_storage:
  litellm_pg_data: